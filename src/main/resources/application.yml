server:
  port: 8081

spring:
  application:
    name: game-platform-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: main-service
              uri: http://main-service:8082
              predicates:
                - Path=/api/v1/**
              filters:

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/game-realm

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always