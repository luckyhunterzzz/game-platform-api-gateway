server:
  port: 8081

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  application:
    name: game-platform-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: main-service
              uri: http://main-service:8082
              predicates:
                - Path=/api/v1/**
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                          allowedOrigins:
                            - ${app.cors.allowed-origins}
                          allowedMethods:
                            - GET
                            - POST
                            - PUT
                            - PATCH
                            - DELETE
                            - OPTIONS
                          allowedHeaders:
                            - Authorization
                            - Content-Type
                            - X-Request-Id
                          exposedHeaders:
                            - X-Request-Id
                          allowCredentials: false
                          maxAge: 3600

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/game-realm

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always